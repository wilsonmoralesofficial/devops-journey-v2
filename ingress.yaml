apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mi-api-ingress
spec:
  rules:
    - host: mi-api.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mi-api-service
                port:
                  number: 8000